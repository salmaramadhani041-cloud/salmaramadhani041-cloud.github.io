<!DOCTYPE html>
<html>
<head>
    <title>Biodataku</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            color: blue;
        }
        .content {
            background-color: #f2f2f2;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
        }
        .bold {
            font-weight: bold;
        }

        .nama {
            color: green;
        }
        .nim {
            color: purple;
        }
        .usia {
            color: orange;
        }
    </style>
</head>
<body>

    <h1>BIODATAKU</h1>

    <div class="content">
        <p>
            <span class="bold">
                <span class="nama"> Nama : Syifa salma </span> 
            </span>
        </p>

        <p>
            <span class="bold nim"> NIM : 124005006</span>
        </p>

        <p>
            <span class="bold usia"> Usia : 20 Tahun</span>
        </p>
    </div>

</body>
</html>
